<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Reflow{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  <script>document.documentElement.setAttribute('data-theme',
    localStorage.getItem('theme') || 'light');</script>
  <script src="/static/vendor/htmx.min.js"></script>
  <script defer src="/static/vendor/alpine.min.js"></script>
</head>
<body>
<svg class="svg-sprite" aria-hidden="true">
  <symbol id="icon-pencil" viewBox="0 0 24 24">
    <path d="M12 20h9"/>
    <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"/>
  </symbol>
  <symbol id="icon-undo" viewBox="0 0 24 24">
    <polyline points="9 14 4 9 9 4"/>
    <path d="M20 20v-7a4 4 0 0 0-4-4H4"/>
  </symbol>
  <symbol id="icon-paperclip" viewBox="0 0 24 24">
    <path d="M21.44 11.05 9.85 22.64a5 5 0 0 1-7.07-7.07L14.37 3.97a3.5 3.5 0 0 1 4.95 4.95L7.39 20.85a2 2 0 0 1-2.83-2.83l10.6-10.6"/>
  </symbol>
</svg>
<header class="topnav">
  <a class="brand" href="/">⟲ Reflow</a>
  <nav class="crumbs">{% block crumbs %}{% endblock %}</nav>
  <form class="hash-jump" hx-get="/hash-lookup" hx-swap="none" autocomplete="off"
        onsubmit="return false">
    <input class="input" type="text" name="q" placeholder="哈希跳转…"
           title="输入提交节点/硬更改的哈希值（至少 4 位），回车跳转到详情页"
           aria-label="哈希跳转">
  </form>
  <span class="menu" x-data="{nav:false}" @click.outside="nav=false">
    <button type="button" class="menu-btn topnav-menu-btn" title="菜单" aria-label="菜单"
            @click="nav=!nav">⋯</button>
    <nav class="menu-pop topnav-actions" x-show="nav" x-cloak @click="nav=false">
      {% block ctxlinks %}{% endblock %}
      <button type="button" class="theme-toggle" title="切换白天/夜间模式"
        x-data="{t: document.documentElement.getAttribute('data-theme')}"
        @click="t = t === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', t);
                localStorage.setItem('theme', t)"
        x-text="t === 'dark' ? '☀️ 切换白天模式' : '🌙 切换夜间模式'"></button>
    </nav>
  </span>
</header>
<main>{% block content %}{% endblock %}</main>
<div id="modal"></div>
<div id="toast-zone">
  {% if request.query_params.get('flash') %}
  <div class="toast">{{ request.query_params.get('flash') }}</div>
  {% endif %}
</div>
<script>
  function showToast(msg){
    const z = document.getElementById('toast-zone');
    const t = document.createElement('div');
    t.className = 'toast'; t.textContent = msg;
    z.appendChild(t); setTimeout(() => t.remove(), 3500);
  }
  document.body.addEventListener('showToast', e => showToast(e.detail.value));
  document.querySelectorAll('#toast-zone .toast')
    .forEach(t => setTimeout(() => t.remove(), 3500));
  function renderLocalDates(root){
    (root || document).querySelectorAll('time.local-dt').forEach(el => {
      const iso = el.getAttribute('datetime');
      const d = iso ? new Date(iso) : null;
      if (d && !isNaN(d)) el.textContent = d.toLocaleString('zh-CN', { hour12: false });
    });
  }
  renderLocalDates();
  document.body.addEventListener('htmx:afterSwap', e => renderLocalDates(e.target));
  // 任意点击都在捕获阶段广播 close-menus（先于按钮上 @click.stop / stopPropagation 执行），
  // 让所有展开的弹出菜单据此判断点击是否落在自身之外来决定关闭——
  // 修复点击其他卡片的三点/复制按钮时菜单不消失的问题（这些按钮会阻止冒泡，使 @click.outside 失效）。
  document.addEventListener('click', function(e){
    window.dispatchEvent(new CustomEvent('close-menus', { detail: e.target }));
  }, true);
  function copyHash(text){
    var done = function(){ showToast('已复制哈希值'); };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done, function(){ _fallbackCopy(text, done); });
    } else {
      _fallbackCopy(text, done);
    }
  }
  function _fallbackCopy(text, done){
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); done(); } catch(e) {}
    document.body.removeChild(ta);
  }
</script>
</body>
</html>
