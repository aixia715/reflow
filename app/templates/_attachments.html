<div id="attachments" class="panel">
  <div class="panel-title">附件（{{ attachments|length }}）</div>
  <div class="attach-list">
    {% for a in attachments %}
    <div class="attach-row">
      <span class="attach-name">
        <a href="/board/{{ board_id }}/node/{{ node.id }}/attachments/{{ a.id }}/download"
           title="下载 {{ a.filename }}">{{ a.filename }}</a>
        <span class="muted">· <time class="local-dt" datetime="{{ a.created_at }}">{{ a.created_at }}</time></span>
      </span>
      <button type="button" class="btn-link danger"
              hx-post="/board/{{ board_id }}/node/{{ node.id }}/attachments/{{ a.id }}/delete"
              hx-target="#attachments" hx-swap="outerHTML"
              hx-confirm="确认删除附件「{{ a.filename }}」？该文件将从磁盘移除，不可恢复。">
        删除
      </button>
    </div>
    {% else %}
    <p class="muted">还没有附件</p>
    {% endfor %}
  </div>
  <form class="attach-form"
        hx-post="/board/{{ board_id }}/node/{{ node.id }}/attachments"
        hx-target="#attachments" hx-swap="outerHTML"
        enctype="multipart/form-data"
        @htmx:after-request.camel="if ($event.detail.successful) { $refs.fileInput.value = ''; }">
    <input class="input" type="file" name="files" multiple x-ref="fileInput">
    <button class="btn btn-outline" type="submit">上传附件</button>
  </form>
</div>
