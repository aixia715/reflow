name: publish-image

on:
  push:
    tags: ["v*.*.*"]

# 同一 tag 重推或短时间连发多个 tag 时串行执行，避免并发 push 导致
# 旧版本覆盖新版本的浮动 latest
concurrency:
  group: publish-image
  cancel-in-progress: false

jobs:
  verify-tag-on-master:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: 校验 tag 是否已合入 master
        run: |
          git fetch origin master
          if ! git merge-base --is-ancestor "${{ github.sha }}" origin/master; then
            echo "::error::tag ${GITHUB_REF#refs/tags/} 指向的提交（${{ github.sha }}）不在 master 分支历史中，请先合并到 master 再打 tag"
            exit 1
          fi

  checks:
    needs: verify-tag-on-master
    uses: ./.github/workflows/_checks.yml

  publish:
    needs: [verify-tag-on-master, checks]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: 解析版本号与镜像名
        id: version
        run: |
          echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          # GHCR 镜像名必须全小写；github.repository 归属组织/用户改名或大小写变化时也不受影响
          echo "image=ghcr.io/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建镜像
        run: |
          docker build \
            --build-arg VERSION="${{ steps.version.outputs.tag }}" \
            --label org.opencontainers.image.version="${{ steps.version.outputs.tag }}" \
            --label org.opencontainers.image.revision="${{ github.sha }}" \
            --label org.opencontainers.image.source="${{ github.server_url }}/${{ github.repository }}" \
            --label org.opencontainers.image.created="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -t "${{ steps.version.outputs.image }}:${{ steps.version.outputs.tag }}" \
            -t "${{ steps.version.outputs.image }}:latest" \
            .

      - name: 推送镜像
        run: docker push --all-tags "${{ steps.version.outputs.image }}"
