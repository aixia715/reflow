name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, edited]
  pull_request:
    types: [opened, reopened]   # 不含 synchronize，避免每次 push 重复评审；要每次 push 评审再加 synchronize

jobs:
  # 1) 评论触发：/opencode 或 /oc —— 不设 prompt（否则覆盖评论指令）
  comment:
    if: |
      (github.event_name == 'issue_comment' &&
        (contains(github.event.comment.body, '/opencode') || contains(github.event.comment.body, '/oc'))) ||
      (github.event_name == 'pull_request_review_comment' &&
        (contains(github.event.comment.body, '/opencode') || contains(github.event.comment.body, '/oc')))
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false
      - uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        with:
          model: ${{ vars.OPENCODE_MODEL }}

  # 2) Issue 触发：门控关键词（复刻 @claude 语义）；issues 必须带 prompt
  issue:
    if: |
      github.event_name == 'issues' &&
      (contains(github.event.issue.body, '/opencode') || contains(github.event.issue.body, '/oc') ||
       contains(github.event.issue.title, '/opencode') || contains(github.event.issue.title, '/oc'))
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false
      - uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        with:
          model: ${{ vars.OPENCODE_MODEL }}
          prompt: "阅读本 issue 的标题与正文，按其中描述的需求或缺陷进行处理：在新分支实现/修复并提交，开一个 PR。遵循仓库 CLAUDE.md 的约定，用中文回复与说明。"

  # 3) PR 自动评审（增强项）：pull_request 事件，给评审 prompt
  review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false
      - uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        with:
          model: ${{ vars.OPENCODE_MODEL }}
          prompt: "审阅这个 PR 的改动：聚焦正确性、潜在 bug、与本仓库约定（见 CLAUDE.md）的一致性。用中文把结论作为评论发表。"
