name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

env:
    ANTHROPIC_MODEL: ${{vars.ANTHROPIC_MODEL}}

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Optional: Customize the trigger phrase (default: @claude)
          # trigger_phrase: "/claude"

          # Optional: Trigger when specific user is assigned to an issue
          # assignee_trigger: "claude-bot"

          # Optional: Configure Claude's behavior with CLI arguments
          # claude_args: |
          #   --model claude-opus-4-1-20250805
          #   --max-turns 10
          #   --allowedTools "Bash(npm install),Bash(npm run build),Bash(npm run test:*),Bash(npm run lint:*)"
          #   --system-prompt "Follow our coding standards. Ensure all new code has tests. Use TypeScript for new files."

          # Optional: Advanced settings configuration
          # settings: |
          #   {
          #     "env": {
          #       "NODE_ENV": "test"
          #     }
          #   }

  # PR 评论触发 /review-cc：用统一评审 prompt（.github/review-prompt.md）唤起 Claude Code 评审。
  # 与上面的 @claude 通用唤起分开：这里注入固定评审 prompt，自动套用仓库评审标准（含文档同步检查），
  # 无需每次手写要求。与 ci.yml 自动评审、opencode 的 /review-oc 共用同一份评审标准。
  review:
    if: |
      (github.event_name == 'issue_comment' && github.event.issue.pull_request &&
        contains(github.event.comment.body, '/review-cc')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '/review-cc'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # 评审作为 PR 评论发表
      id-token: write
      actions: read          # 让 Claude 能读 PR 上的 CI 结果
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      # 统一评审标准抽到 .github/review-prompt.md，自动评审与 /review-oc、/review-cc 共用。
      # 顶部额外注入 REPO / PR 编号：PR 评论触发走 agent 模式，Claude 默认不带 PR 上下文，
      # 显式给出仓库与 PR 号，便于它用 gh 读 diff、发评论（对照官方 pr-review 示例）。
      - name: 载入评审 prompt
        id: review_prompt
        run: |
          {
            echo 'text<<REVIEW_PROMPT_EOF'
            echo "REPO: ${{ github.repository }}"
            # 两种触发事件取 PR 号字段不同：issue_comment 用 issue.number，
            # pull_request_review_comment payload 无 issue 字段、只有 pull_request.number，故兜底
            echo "PR NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}"
            echo ""
            cat .github/review-prompt.md
            echo REVIEW_PROMPT_EOF
          } >> "$GITHUB_OUTPUT"

      - name: Run Claude Code review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # PR 评论触发会被识别为 agent 模式，默认不创建/更新 PR 评论，结论只进日志（见排查）。
          # track_progress 强制走 tag 模式：建一条 tracking 评论并把评审结论更新进去，同时注入 PR 上下文。
          track_progress: true
          prompt: ${{ steps.review_prompt.outputs.text }}
          # 放行发 PR 评论 / 行内评论、读 diff 与 PR 信息所需工具（对照官方 PR 评审示例）
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
